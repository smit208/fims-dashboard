version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fims_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: portfolio/Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/fims_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../server:/app/server
      - /app/server/node_modules

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
